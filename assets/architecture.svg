<svg viewBox="0 0 940 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9aa3ab"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="560" fill="#fbfbf9"/>
  <text x="470" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#2b2b2b">星球内容助手 · 系统关系图</text>
  <text x="470" y="70" text-anchor="middle" font-size="14" fill="#8a8a8a">每天自动把知识星球的好内容，变成你能按专题学习的知识库</text>

  <!-- 1 知识星球 -->
  <rect x="34" y="150" width="168" height="96" rx="14" fill="#e8f0fe" stroke="#4f6d7a" stroke-width="1.5"/>
  <text x="118" y="192" text-anchor="middle" font-size="18" font-weight="700" fill="#2f4858">① 知识星球</text>
  <text x="118" y="216" text-anchor="middle" font-size="13" fill="#5a6b78">姜胡说 · 珍大户</text>
  <text x="118" y="234" text-anchor="middle" font-size="12" fill="#8a97a1">（内容来源）</text>

  <!-- arrow 1->2 -->
  <line x1="204" y1="198" x2="266" y2="198" stroke="#9aa3ab" stroke-width="2" marker-end="url(#arw)"/>
  <text x="235" y="182" text-anchor="middle" font-size="12" fill="#6b7580">每天</text>
  <text x="235" y="230" text-anchor="middle" font-size="11" fill="#9aa3ab">星主+精华</text>

  <!-- 2 AI 加工 -->
  <rect x="268" y="150" width="168" height="96" rx="14" fill="#e6f4ea" stroke="#5b8a72" stroke-width="1.5"/>
  <text x="352" y="188" text-anchor="middle" font-size="18" font-weight="700" fill="#2f5d45">② AI 加工</text>
  <text x="352" y="212" text-anchor="middle" font-size="12.5" fill="#4a7a5f">读一遍每条内容，</text>
  <text x="352" y="230" text-anchor="middle" font-size="12.5" fill="#4a7a5f">生成 摘要 · 标签 · 专题</text>

  <!-- arrow 2->3 -->
  <line x1="438" y1="198" x2="500" y2="198" stroke="#9aa3ab" stroke-width="2" marker-end="url(#arw)"/>

  <!-- 3 飞书表格 (hub) -->
  <rect x="502" y="140" width="182" height="116" rx="14" fill="#fdeede" stroke="#c77f2a" stroke-width="2"/>
  <text x="593" y="180" text-anchor="middle" font-size="18" font-weight="700" fill="#a15f18">③ 飞书表格</text>
  <text x="593" y="204" text-anchor="middle" font-size="13" fill="#9a6a2c">你的知识库总账</text>
  <text x="593" y="224" text-anchor="middle" font-size="12" fill="#b1863f">所有内容都汇总在这</text>
  <text x="593" y="242" text-anchor="middle" font-size="11" fill="#c19a5e">（可直接按时间/专题看）</text>

  <!-- outputs -->
  <!-- 图谱 -->
  <line x1="684" y1="176" x2="748" y2="132" stroke="#9aa3ab" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="750" y="86" width="176" height="86" rx="14" fill="#f1ebf7" stroke="#7a5c9e" stroke-width="1.5"/>
  <text x="838" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#57407a">知识图谱网页</text>
  <text x="838" y="142" text-anchor="middle" font-size="12.5" fill="#6f5a92">按专题学习</text>
  <text x="838" y="159" text-anchor="middle" font-size="12" fill="#8b79ab">每天自动更新</text>

  <!-- 周报 -->
  <line x1="686" y1="198" x2="748" y2="198" stroke="#9aa3ab" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="750" y="182" width="176" height="66" rx="14" fill="#f1ebf7" stroke="#7a5c9e" stroke-width="1.5"/>
  <text x="838" y="210" text-anchor="middle" font-size="16" font-weight="700" fill="#57407a">每周精华周报</text>
  <text x="838" y="230" text-anchor="middle" font-size="12.5" fill="#6f5a92">周日自动推到飞书群</text>

  <!-- 问答 -->
  <line x1="684" y1="220" x2="748" y2="264" stroke="#9aa3ab" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="750" y="258" width="176" height="66" rx="14" fill="#f1ebf7" stroke="#7a5c9e" stroke-width="1.5"/>
  <text x="838" y="286" text-anchor="middle" font-size="16" font-weight="700" fill="#57407a">语义问答</text>
  <text x="838" y="306" text-anchor="middle" font-size="12.5" fill="#6f5a92">随时提问，综合回答</text>

  <!-- Cookie alert -->
  <line x1="118" y1="246" x2="118" y2="360" stroke="#d9a3a0" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arw)"/>
  <rect x="34" y="362" width="240" height="60" rx="12" fill="#fcecea" stroke="#c0504d" stroke-width="1.5"/>
  <text x="154" y="388" text-anchor="middle" font-size="14" font-weight="700" fill="#a23c39">登录失效自动报警</text>
  <text x="154" y="408" text-anchor="middle" font-size="12" fill="#b45b58">飞书机器人提醒你更新 Cookie</text>

  <!-- bottom automation band -->
  <rect x="34" y="462" width="892" height="60" rx="14" fill="#eef1f4" stroke="#d3d9df" stroke-width="1"/>
  <text x="480" y="490" text-anchor="middle" font-size="15" font-weight="700" fill="#3a4650">全程由电脑定时任务每天自动运行，无需手动操作</text>
  <text x="480" y="510" text-anchor="middle" font-size="12.5" fill="#7a848d">开机就跑 · 抓漏自动补 · 失败自动重试并提醒</text>
</svg>
